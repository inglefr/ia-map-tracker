name: Mise à jour des cours IA

on:
  schedule:
    - cron: "0 5 * * 1-5"
  workflow_dispatch:
    inputs:
      scope:
        description: "Quoi mettre à jour"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - level1
          - level2

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Récupérer les cours
        run: node scripts/fetch-prices.mjs ${{ inputs.scope || 'all' }}

      - name: Commit et push si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "Mise à jour automatique des cours (${{ inputs.scope || 'all' }})"
          git push
